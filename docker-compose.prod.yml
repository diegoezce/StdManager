version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: goplanify_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-goplanify_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-goplanify_password}
      POSTGRES_DB: ${DB_NAME:-goplanify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-goplanify_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goplanify_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goplanify_backend
    command: >
      sh -c 'cd backend &&
             python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class sync --timeout 120'
    environment:
      DEBUG: 'False'
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER:-goplanify_user}:${DB_PASSWORD:-goplanify_password}@postgres:5432/${DB_NAME:-goplanify}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000/api/v1}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/auth/users/me/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: goplanify_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000/api/v1}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goplanify_worker
    command: cd backend && celery -A config worker -l info --concurrency=4
    environment:
      DEBUG: 'False'
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER:-goplanify_user}:${DB_PASSWORD:-goplanify_password}@postgres:5432/${DB_NAME:-goplanify}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./backend:/app/backend

volumes:
  postgres_data:
