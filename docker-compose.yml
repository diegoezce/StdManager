services:
  postgres:
    image: postgres:15-alpine
    container_name: goplanify_postgres
    environment:
      POSTGRES_DB: goplanify_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: goplanify_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: goplanify_backend
    command: sh -c "sleep 5 && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: goplanify_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: django-insecure-dev-key-change-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: goplanify_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
